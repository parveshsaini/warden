# Run from the repo root:
#   WARDEN_API_KEYS=some-long-random-key docker compose -f examples/docker-compose.yaml up
# Then point an MCP client at http://localhost:3000/mcp with
#   Authorization: Bearer some-long-random-key
services:
  warden:
    build:
      context: ..
    ports:
      - "3000:3000"
    volumes:
      - ./warden.config.docker.yaml:/app/warden.config.yaml:ro
    environment:
      # Comma-separated Bearer keys for /mcp and /metrics; unset = no auth (dev only).
      WARDEN_API_KEYS: ${WARDEN_API_KEYS:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
